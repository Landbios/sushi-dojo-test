service: sushi-dojo

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev

plugins:
  - serverless-offline

functions:
  api:
    handler: .next/server/pages/api/[...args].handler # This is a placeholder, Next.js typically needs a specific adapter for AWS Lambda
    events:
      - http:
          path: /api/{proxy+}
          method: any

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
